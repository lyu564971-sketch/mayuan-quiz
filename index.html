<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马原答题助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#6e6e73;--muted:#aeaeb2;
  --accent:#5856d6;--accent-soft:#f0eeff;--green:#34c759;--green-soft:#eafff0;
  --red:#ff3b30;--red-soft:#fff0ef;--border:#e8e8ed;--radius:14px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
}
[data-theme="dark"]{
  --bg:#1c1c1e;--card:#2c2c2e;--text:#f5f5f7;--sub:#a1a1a6;--muted:#636366;
  --accent:#5e5ce6;--accent-soft:#2c2c4a;--green:#30d158;--green-soft:#1a3a1e;
  --red:#ff453a;--red-soft:#3a1a1a;--border:#38383a;
}
html{font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100dvh}
::selection{background:var(--accent);color:#fff}
button,.btn,.mode,.ch,.q-dot,.opt,.confirm,.nav-b,.bookmark-btn,.ai-box-hd{touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
button:focus,.btn:focus,.mode:focus,.ch:focus,.q-dot:focus,.opt:focus,.confirm:focus,.nav-b:focus,.bookmark-btn:focus,.ai-box-hd:focus{outline:none}
button:focus-visible,.btn:focus-visible,.mode:focus-visible,.ch:focus-visible,.q-dot:focus-visible,.opt:focus-visible,.confirm:focus-visible,.nav-b:focus-visible,.bookmark-btn:focus-visible,.ai-box-hd:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* === 布局 === */
.app{max-width:640px;margin:0 auto;padding:0 20px}

/* === 首页 === */
.home{padding:60px 0 40px}
.home-title{font-size:1.75rem;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.home-sub{color:var(--sub);font-size:.87rem;margin-bottom:36px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat{background:var(--card);border:none;border-radius:var(--radius);padding:20px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-num{font-size:1.6rem;font-weight:700;font-variant-numeric:tabular-nums}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.mode{background:var(--card);border:1.5px solid transparent;border-radius:var(--radius);padding:20px 16px;cursor:pointer;text-align:center;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mode:hover{border-color:var(--accent);background:var(--accent-soft)}
.mode.active{border-color:var(--accent);background:var(--accent-soft)}
.mode-icon{font-size:1.4rem;margin-bottom:6px}
.mode-name{font-weight:600;font-size:.87rem}
.mode-desc{font-size:.73rem;color:var(--muted);margin-top:2px}
.chapters{margin-bottom:20px}
.chapters-title{font-size:.8rem;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.ch-list{display:flex;flex-direction:column;gap:6px}
.ch{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.ch:hover{border-color:var(--accent)}
.ch.active{border-color:var(--accent);background:var(--accent-soft)}
.ch-name{font-size:.85rem;font-weight:500}
.ch-count{font-size:.73rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:20px}
.btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.01em;box-shadow:0 4px 12px rgba(88,86,214,.3)}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.98)}
.btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}

/* === 答题页 === */
.quiz{padding:16px 0 100px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:16px}
.back{background:none;border:none;font-size:.85rem;color:var(--sub);cursor:pointer;padding:6px 0}
.back:hover{color:var(--text)}
.progress-text{font-size:.8rem;color:var(--muted);font-variant-numeric:tabular-nums}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.q-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;max-height:80px;overflow-y:auto}
.q-dot{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:.7rem;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all .1s;color:var(--sub)}
.q-dot.cur{background:var(--text);color:#fff;border-color:var(--text)}
.q-dot.done{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.q-dot.wrg{background:var(--red-soft);border-color:var(--red);color:var(--red)}

/* === 题目卡片 === */
.q-card{background:var(--card);border:none;border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.q-meta{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tag{font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:500;background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.tag-type{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.q-stem{font-size:.95rem;line-height:1.7;font-weight:500;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--card);transition:all .12s;text-align:left}
.opt:hover:not(.dis){border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt.cor{border-color:var(--green);background:var(--green-soft)}
.opt.wrg{border-color:var(--red);background:var(--red-soft)}
.opt.dis{cursor:default;opacity:.85}
.opt-letter{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:600;font-size:.78rem;background:var(--bg);color:var(--sub);flex-shrink:0;transition:all .12s}
.opt.sel .opt-letter{background:var(--accent);color:#fff}
.opt.cor .opt-letter{background:var(--green);color:#fff}
.opt.wrg .opt-letter{background:var(--red);color:#fff}
.confirm{width:100%;padding:12px;background:var(--text);color:#fff;border:none;border-radius:10px;font-size:.87rem;font-weight:600;cursor:pointer;margin-top:12px;transition:all .12s}
.confirm:hover{opacity:.85}
.confirm:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}

/* === 反馈 === */
.feed{margin-top:16px;padding:16px;border-radius:10px;font-size:.85rem;line-height:1.7;animation:fadeUp .25s ease}
.feed.ok{background:var(--green-soft);border-left:3px solid var(--green)}
.feed.no{background:var(--red-soft);border-left:3px solid var(--red)}
.feed-title{font-weight:700;margin-bottom:4px}
.feed.ok .feed-title{color:var(--green)}
.feed.no .feed-title{color:var(--red)}
.feed-ans{color:var(--sub);font-size:.82rem}

/* === AI 解析 === */
.ai-wrap{margin-top:16px}
.ai-btn{width:100%;padding:14px;background:var(--card);color:var(--accent);border:1.5px solid var(--border);border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ai-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.ai-btn:disabled{opacity:.6;cursor:wait}
.ai-box{margin-top:12px;background:var(--card);border:none;border-radius:var(--radius);overflow:hidden;animation:fadeUp .3s ease;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ai-box-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .15s}
.ai-box-hd:hover{background:var(--accent-soft)}
.ai-box-title{font-size:.82rem;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px}
.ai-box-arrow{font-size:.7rem;color:var(--muted);transition:transform .25s;flex-shrink:0}
.ai-box.open .ai-box-arrow{transform:rotate(90deg)}
.ai-box-bd{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.ai-box.open .ai-box-bd{max-height:var(--ai-h,5000px)}
.ai-box-inner{padding:4px 16px 16px}
.ai-sec{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ai-sec:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.ai-sec-hd{font-size:.85rem;font-weight:700;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:5px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ai-sec-bd{font-size:.84rem;line-height:1.9;color:var(--text);white-space:pre-wrap}
.ai-sec-title{font-size:.78rem;font-weight:700;color:var(--sub);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.ai-p{font-size:.83rem;line-height:1.85;color:var(--text);white-space:pre-wrap}
.ai-sec-bd strong,.ai-p strong{color:var(--text);font-weight:600}
.feed-clear{margin-top:10px;padding:8px 14px;background:var(--green-soft);color:var(--green);border:1px solid var(--green);border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;display:inline-block;transition:all .15s}
.feed-clear:hover{background:var(--green);color:#fff}
.ai-badge{background:var(--accent);color:#fff;font-size:.55rem;padding:1px 5px;border-radius:6px;margin-left:4px;vertical-align:middle}
.ai-thinking{background:var(--accent-soft);border-radius:8px;padding:10px 14px;margin:8px 0;font-size:.82rem;color:var(--accent);display:flex;align-items:center;gap:8px}
.ai-thinking-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:thinkPulse 1.4s ease-in-out infinite}
.ai-thinking-dot:nth-child(2){animation-delay:.2s}
.ai-thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes thinkPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.ai-typing::after{content:"\258d";animation:blink .6s infinite;color:var(--accent)}
.ai-stream-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);opacity:0;transform:translateY(8px);animation:fadeUp .3s ease forwards}
.ai-stream-section:nth-child(2){animation-delay:.1s}
.ai-stream-section:nth-child(3){animation-delay:.2s}
.ai-stream-section:nth-child(4){animation-delay:.3s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ai-stream{margin-top:12px;background:var(--card);border:1px solid var(--accent);border-radius:var(--radius);padding:16px;animation:fadeUp .3s ease}


/* === THINK mode streaming === */
.ai-thinking-wrap{background:linear-gradient(135deg,var(--accent-soft),var(--card));border:1px solid var(--accent);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.ai-thinking-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:thinkScan 2s linear infinite}
@keyframes thinkScan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.ai-think-head{position:relative;font-size:.82rem;font-weight:700;color:var(--accent);margin-bottom:8px}
.ai-think-sub{position:relative;font-size:.74rem;line-height:1.6;color:var(--sub);margin-bottom:12px}
.ai-think-body{position:relative;font-size:.82rem;line-height:1.8;color:var(--text);white-space:pre-wrap}
.ai-sec{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ai-sec:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.ai-sec-hd{font-size:.85rem;font-weight:700;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:5px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ai-sec-bd{font-size:.84rem;line-height:1.9;color:var(--text);white-space:pre-wrap}
/* === 导航按钮 === */
.nav-row{display:flex;gap:10px;margin-top:20px}
.nav-b{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);font-size:.87rem;font-weight:600;cursor:pointer;transition:all .12s;color:var(--text)}
.nav-b:hover{border-color:var(--accent);color:var(--accent)}

/* === 结果页 === */
.result{padding:60px 0;text-align:center}
.result-score{font-size:3.5rem;font-weight:800;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums}
.result-label{color:var(--muted);font-size:.85rem;margin-bottom:32px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.result-stat{background:var(--card);border:none;border-radius:var(--radius);padding:20px 16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.result-stat-num{font-size:1.4rem;font-weight:700}
.result-stat-label{font-size:.73rem;color:var(--muted);margin-top:2px}

/* === 错题页 === */
.wrongs{padding:16px 0}
.wrongs-head{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.wrongs-title{font-size:1rem;font-weight:700}
.wrongs-count{font-size:.8rem;color:var(--muted)}
.wrong-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px}
.wrong-stem{font-size:.87rem;font-weight:500;margin-bottom:8px;line-height:1.6}
.wrong-ans{font-size:.8rem;color:var(--sub)}

/* === 动画 === */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === 移动端 === */
@media(max-width:480px){
  .app{padding:0 16px}
  .home{padding:40px 0 30px}
  .home-title{font-size:1.3rem}
  .modes{grid-template-columns:1fr}
  .q-card{padding:20px}
  .q-stem{font-size:.9rem}
  .ai-section{padding:16px}
  .q-dot{width:24px;height:24px;font-size:.65rem}
}

/* === 学习统计卡片 === */
.stats-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.stats-card-title{font-size:.85rem;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-item{text-align:center}
.stat-item-num{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums}
.stat-item-label{font-size:.7rem;color:var(--muted);margin-top:2px}

/* === 进度条（首页） === */
.progress-ring{width:60px;height:60px;margin:0 auto 8px}
.progress-ring-bg{fill:none;stroke:var(--border);stroke-width:6}
.progress-ring-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .5s ease}

/* === 计时器 === */
.timer{font-size:.75rem;color:var(--muted);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:4px}
.timer-icon{font-size:.7rem}

/* === 收藏按钮 === */
.bookmark-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all .15s;opacity:.5}
.bookmark-btn:hover{opacity:1;background:var(--accent-soft)}
.bookmark-btn.active{opacity:1;transform:scale(1.1)}

/* === 深色模式切换 === */
.theme-toggle{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;gap:6px;transition:all .15s}
.theme-toggle:hover{border-color:var(--accent)}

/* === 搜索栏 === */
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-input{flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.85rem;background:var(--card);color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}

/* === 统计图表（简易条形图） === */
.chart-bar{height:8px;background:var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden}
.chart-fill{height:100%;border-radius:4px;transition:width .5s ease}
.chart-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--sub);margin-bottom:4px}

/* === 章节统计 === */
.chapter-stat{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border)}
.chapter-stat:last-child{border-bottom:none}
.chapter-stat-name{font-size:.82rem;font-weight:500;flex:1}
.chapter-stat-bar{width:80px;height:6px;background:var(--border);border-radius:3px;margin:0 10px;overflow:hidden}
.chapter-stat-fill{height:100%;background:var(--accent);border-radius:3px}
.chapter-stat-pct{font-size:.7rem;color:var(--muted);width:40px;text-align:right}

/* === 按钮变体 === */
.btn-ghost{background:var(--card);color:var(--text);border:1.5px solid var(--border);box-shadow:none}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:8px 16px;font-size:.8rem;border-radius:8px}

/* === 工具栏 === */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* === 收藏/导出/分享弹窗 === */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:16px;padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--sub);padding:4px}

/* === 分享卡片 === */
.share-card{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.share-title{font-size:1.2rem;font-weight:800;margin-bottom:8px}
.share-stats{display:flex;justify-content:center;gap:20px;margin-bottom:12px}
.share-stat{text-align:center}
.share-stat-num{font-size:1.8rem;font-weight:700}
.share-stat-label{font-size:.7rem;opacity:.8}

/* === 移动端适配 === */
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .toolbar{gap:6px}
  .btn-sm{padding:6px 12px;font-size:.75rem}
  .search-bar{flex-direction:column}
  .modal{padding:20px;margin:10px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>

function renderQuiz(){
  const qs=window._qs, q=qs[idx], n=qs.length;

    stopTimer();
    _timerElapsed=a.time||0;
  }else{
    startTimer(q.id);
  }
  let h=`
  <div class="quiz">
    <div class="topbar"><button class="back" onclick="stopTimer();screen='home';render()">← 返回</button>

    </div>

  qs.forEach((x,i)=>{
    const ans=answers[x.id];
    let cls='q-dot';
    if(i===idx) cls+=' cur';
    else if(ans&&ans.done) cls+=ans.ok?' done':' wrg';

  });
  h+=`</div><div class="q-card">

    </div>

    <div class="opts">`;
  const keys=Object.keys(q.options||{}).filter(k=>q.options[k]);
  keys.forEach(k=>{
    let cls='opt';
    if(done){cls+=' dis';if(q.answer.includes(k))cls+=' cor';else if(a.sel.includes(k))cls+=' wrg'}
    else if(a&&a.sel&&a.sel.includes(k)) cls+=' sel';
    h+=`<div class="${cls}" onclick="pick('${k}')"><span class="opt-letter">${k}</span><span>${esc(q.options[k])}</span></div>`;
  });
  h+=`</div>`;
  if(q.type==='multiple'&&!done){
    const has=a&&a.sel&&a.sel.length;
    h+=`<button class="confirm" onclick="confirmMulti()" ${has?'':'disabled'}>确认提交</button>`;
  }
  if(done){
    const ok=a.ok;
    h+=`<div class="feed ${ok?'ok':'no'}"><div class="feed-title">${ok?'✅ 回答正确':'❌ 回答错误'}</div>`;
    if(!ok) h+=`<div class="feed-ans">你的答案：${esc(a.sel.join(''))}</div>`;
    h+=`<div class="feed-ans">正确答案：${esc(q.answer)}</div>`;
    if(ok&&wrongs.includes(q.id)){h+=`<div class="feed-clear" onclick="removeWrong(${q.id});render()">✅ 已掌握，移除错题</div>`}
    h+=`</div>`;
  }
  if(_ai.cache[q.id]){
    h+='<div class="ai-wrap">'+_aiBoxHTML(_ai.cache[q.id],true,false)+'</div>';
  }else if(_ai.status==='streaming'&&_ai.qid===q.id){
    h+='<div class="ai-wrap">'+_aiBoxHTML(null,true,true)+'</div>';
  }else if(_ai.status==='error'&&_ai.cache[q.id]){
    h+='<div class="ai-wrap">'+_aiBoxHTML(_ai.cache[q.id],true,false)+'</div>';
  }else{
    h+=`<div class="ai-wrap"><button class="ai-btn" onclick="askAI(${q.id})">\ud83e\udde0 AI \u89e3\u6790</button></div>`;
  }
  h+=`</div><div class="nav-row"><button class="nav-b" onclick="prevQ()" ${idx===0?'disabled':''}>上一题</button><button class="nav-b" onclick="nextQ()">${idx===n-1?'查看结果':'下一题'}</button></div></div>`;
  document.getElementById('app').innerHTML=h;
  if(_ai.status==='streaming'&&_ai.qid===q.id) _streamUpdate();
}
function pick(k){
  const q=window._qs[idx], a=answers[q.id]||{sel:[],done:false,ok:false};
  if(a.done) return;
  _clearInteractionState();
  if(q.type==='multiple'){
    const i=a.sel.indexOf(k);if(i>=0)a.sel.splice(i,1);else a.sel.push(k);a.sel.sort();
  }else{
    a.sel=[k];a.done=true;a.ok=k===q.answer;
    a.time=_timerElapsed;
    stopTimer();
    if(!a.ok)addWrong(q.id);else removeWrong(q.id);
  }
  answers[q.id]=a; saveAns(); render();
  if(a.done&&a.ok&&q.type!=='multiple'&&_ai.status!=='streaming'){autoNextFrom(q.id,idx)}
}
function confirmMulti(){
  const q=window._qs[idx],a=answers[q.id];if(!a||!a.sel.length)return;
  _clearInteractionState();
  a.done=true;a.ok=a.sel.sort().join('')===q.answer.split('').sort().join('');
  a.time=_timerElapsed;
  stopTimer();
  if(!a.ok)addWrong(q.id);else removeWrong(q.id);answers[q.id]=a;saveAns();render();
  if(a.ok&&_ai.status!=='streaming'){autoNextFrom(q.id,idx)}
}
function prevQ(){if(idx>0){goToIndex(idx-1)}}
function nextQ(){_clearInteractionState();if(idx<window._qs.length-1){goToIndex(idx+1)}else{screen='result';render()}}
function autoNextFrom(qid,fromIdx){
  setTimeout(function(){
    if(screen==='quiz'&&window._qs&&window._qs[idx]&&window._qs[idx].id===qid&&idx===fromIdx&&_ai.status!=='streaming') nextQ();
  },800);
}

async function askAI(qid,force){
  if(!force&&_ai.cache[qid]){_stopAIStream(true);_ai.status='done';_ai.qid=qid;render();return;}
  var q=Q.find(function(x){return x.id===qid});
  if(!q) return;
  _stopAIStream(true);
  if(force&&_ai.cache[qid]) delete _ai.cache[qid];
  _ai.status='streaming';_ai.qid=qid;_ai.fullText='';_ai.result=null;
  render();
  _ai._interval=setInterval(_streamUpdate,100);
  _ai.controller=new AbortController();
  var _myCtrl=_ai.controller;
  try{
    var resp=await fetch('/api/explain',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:q.id,type:q.type,chapter:q.chapter,stem:q.stem||q.question,options:q.options,answer:q.answer}),
      signal:_myCtrl.signal
    });
    if(!resp.ok){
      var errText=await resp.text();
      try{
        var errObj=JSON.parse(errText);
        errText=errObj.error||errObj.message||errText;
      }catch(e){}
      throw new Error(errText||('HTTP '+resp.status));
    }
    var reader=resp.body.getReader(),decoder=new TextDecoder(),buf='';
    var parsedResult=null;
    var sawDone=false;
    var handleSSELine=function(line){
      if(!line) return;
      if(line.indexOf('data:')!==0) return;
      var payload=line.replace(/^data:\s*/,'').trim();
      if(!payload) return;
      try{
        var d=JSON.parse(payload);
        if(d.type==='chunk'){_ai.fullText+=d.text||'';_streamUpdate();}
        else if(d.type==='done'){parsedResult=d;sawDone=true;}
        else if(d.type==='error'){throw new Error(d.text||'解析失败');}
      }catch(e){
        if(e.message&&payload.indexOf('"type":"error"')>=0) throw e;
      }
    };
    while(true){
      var result=await reader.read();
      if(result.done) break;
      buf+=decoder.decode(result.value,{stream:true});
      var lines=buf.split('\n');buf=lines.pop();
      for(var i=0;i<lines.length;i++){
        handleSSELine(lines[i]);
      }
    }
    buf+=decoder.decode();
    if(buf.trim()) handleSSELine(buf.trim());
    if(_ai.controller!==_myCtrl) return;
    if(_ai._interval){clearInterval(_ai._interval);_ai._interval=null;}
    _ai.controller=null;
    if(parsedResult&&(_normalizeAIResult(parsedResult).location||_normalizeAIResult(parsedResult).solution||_normalizeAIResult(parsedResult).options_analysis||_normalizeAIResult(parsedResult).warning)){
      _ai.result=parsedResult;
      _ai.cache[qid]=_renderFinal(parsedResult);
      _ai.status='done';
    }else if(_ai.fullText&&_ai.fullText.trim()){
      _ai.cache[qid]=_parseAI(_ai.fullText);
      _ai.status=sawDone?'done':'error';
    }else{
      _ai.cache[qid]='<div style="padding:8px 0;color:var(--red);font-size:.82rem">\u89e3\u6790\u7ed3\u679c\u4e3a\u7a7a\uff0c\u8bf7\u91cd\u8bd5\u3002</div>'+_aiRetryButton(qid,'\u{1f9e0} \u91cd\u65b0\u751f\u6210\u5b8c\u6574\u89e3\u6790');
      _ai.status='error';
    }
    render();
  }catch(err){
    if(_ai.controller!==_myCtrl) return;
    if(_ai._interval){clearInterval(_ai._interval);_ai._interval=null;}
    _ai.controller=null;
    if(err.name==='AbortError'){
      if(_ai.fullText.length>10){_ai.cache[qid]=_renderPausedAI(_ai.fullText,qid);}
      _ai.status='idle';
    }else{
      _ai.status='error';
      _ai.cache[qid]='<div style="padding:8px 0;color:var(--red);font-size:.82rem">'+esc(err.message||'\u89e3\u6790\u5931\u8d25')+'</div>'+_aiRetryButton(qid,'\u{1f9e0} \u91cd\u8bd5');
    }
    render();
  }
}

function _renderThinking(raw,isPaused){
  var title=isPaused?'\u{1f9e0} \u5df2\u6682\u505c\u7684\u601d\u8003\u8fc7\u7a0b':'\u{1f9e0} AI \u6b63\u5728\u601d\u8003';
  var subtitle=isPaused?'\u5df2\u4fdd\u7559\u5f53\u524d\u63a8\u7406\u5185\u5bb9\uff0c\u53ef\u4ee5\u91cd\u65b0\u751f\u6210\u6700\u7ec8\u89e3\u6790\u3002':'\u6b63\u5728\u6574\u7406\u8003\u70b9\u3001\u89e3\u9898\u601d\u8def\u548c\u9009\u9879\u5206\u6790\uff0c\u5b8c\u6210\u540e\u518d\u6e32\u67d3\u6700\u7ec8\u7ed3\u6790\u3002';
  var t=(raw||'').replace(/\r/g,'').trim();
  if(!t) t='\u6b63\u5728\u7ec4\u7ec7\u8003\u70b9\u3001\u89e3\u9898\u601d\u8def\u548c\u9009\u9879\u5206\u6790\u2026';
  return '<div class="ai-thinking-wrap"><div class="ai-think-head">'+title+'</div><div class="ai-think-sub">'+subtitle+'</div><div class="ai-think-body'+(isPaused?'':' ai-typing')+'">'+esc(t).replace(/\n/g,'<br>')+'</div></div>';
}
function _parseAI(raw){
  if(!raw||!raw.trim()) return '<div class="ai-thinking"><div class="ai-thinking-dot"></div><div class="ai-thinking-dot"></div><div class="ai-thinking-dot"></div><span>AI \u6b63\u5728\u601d\u8003...</span></div>';
  var _esc=function(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML};
  var t=raw.trim();
  var obj=null;
  try{obj=JSON.parse(t)}catch(e){}
  if(obj&&typeof obj==='object') return _renderFinal(_normalizeAIResult(obj));
  var partial=t.replace(/,\s*$/,'');
  var opens=(partial.match(/\{/g)||[]).length;
  var closes=(partial.match(/\}/g)||[]).length;
  for(var i=closes;i<opens;i++) partial+='\x7d';
  var qcount=0;
  for(var i=0;i<partial.length;i++){if(partial[i]==='"'&&(i===0||partial[i-1]!=='\\'))qcount++;}
  if(qcount%2!==0) partial+='"';
  try{obj=JSON.parse(partial)}catch(e){}
  if(obj&&typeof obj==='object') return _renderFinal(_normalizeAIResult(obj));
  return '<div class="ai-p ai-typing">'+_esc(t).replace(/\n/g,'<br>')+'</div>';
}
function _renderFinal(d){
  d=_normalizeAIResult(d);
  var _flatten=function(obj){
    if(typeof obj==='string')return obj;
    if(obj===null||obj===undefined)return '';
    if(typeof obj==='number'||typeof obj==='boolean')return String(obj);
    if(Array.isArray(obj)){
      return obj.map(function(item){return _flatten(item)}).filter(Boolean).join('\n');
    }
    if(typeof obj==='object'){
      var parts=[];
      for(var k in obj){
        if(!obj.hasOwnProperty(k))continue;
        var val=_flatten(obj[k]);
        if(!val)continue;
        if(/^[A-Za-z_]\w*$/.test(k)){
          parts.push(val);
        }else{
          parts.push(k+'：'+val);
        }
      }
      return parts.join('\n');
    }
    return '';
  };
  var _cleanKeys=function(s){
    var str=_flatten(s);
    str=str.replace(/^(step\d+|correct|incorrect|confusion|tips|error[_]?thought|analysis|option[_]?\w*)[：:]?\s*/gim,'');
    str=str.replace(/^(correct|incorrect)[：:]\s*/gim,'');
    str=str.replace(/^(confusion|tips|error_thought)[：:]\s*/gim,'');
    return str.trim();
  };
  var fmt=function(t){
    var s=_cleanKeys(t);
    if(!s)return '';
    s=esc(s);
    s=s.replace(/\n/g,'<br>');
    s=s.replace(/(第[一二三四五六七八九十\d]+步[：:])/g,'<strong>$1</strong>');
    s=s.replace(/(审题|原理|结论)[：:]/g,'<strong>$1：</strong>');
    s=s.replace(/(正确|错误)[：:]/g,'<strong>$1：</strong>');
    s=s.replace(/([A-D]项)[：:]/g,'<strong>$1：</strong>');
    return s;
  };
  var sec=function(icon,title,text){
    if(!text)return '';
    return '<div class="ai-sec"><div class="ai-sec-hd">'+icon+' '+title+'</div><div class="ai-sec-bd">'+text+'</div></div>';
  };
  var out=sec('📍','考点定位',fmt(d.location))+
    sec('🧠','解题思路',fmt(d.solution))+
    sec('📋','选项分析',fmt(d.options_analysis))+
    sec('⚠️','易错提醒',fmt(d.warning));
  if(!out)return '<div class="ai-p">'+fmt(d.text||_flatten(d)||'')+'</div>';
  return out;
}

function renderSearchResults(){
  var el=document.getElementById('search-results');
  if(!el)return;
  if(!searchQuery||searchQuery.length<2){el.innerHTML='';return}
  var results=filterQuestions(searchQuery).slice(0,10);
  if(!results.length){el.innerHTML='<div style="padding:12px;color:var(--muted);font-size:.82rem;text-align:center">未找到相关题目</div>';return}
  var h='';
  results.forEach(function(q,i){
    h+='<div style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer" onclick="goToQuestion('+q.id+')">'+
      '<div style="font-size:.7rem;color:var(--muted);margin-bottom:4px">['+typeLabel(q.type)+'] '+esc(q.chapter||'')+'</div>'+
      '<div style="font-size:.82rem;line-height:1.5">'+esc((q.stem||q.question).substring(0,100))+'</div>'+
      '</div>';

// === 新增：答题计时器 ===
var _timerStart=0,_timerInterval=null,_timerElapsed=0,_timerQid=null;
function startTimer(qid){
  if(_timerQid===qid&&_timerInterval)return;
  if(_timerInterval)clearInterval(_timerInterval);
  _timerQid=qid;
  _timerStart=Date.now();
  _timerElapsed=0;
  _timerInterval=setInterval(function(){
    _timerElapsed=Math.floor((Date.now()-_timerStart)/1000);
    var el=document.getElementById('timer-display');
    if(el)el.textContent=formatTime(_timerElapsed);
  },1000);
}
function stopTimer(){if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null} _timerQid=null}
function formatTime(s){var m=Math.floor(s/60);var ss=s%60;return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss}
function getAvgTime(){
  var qs=window._qs||[];var total=0;var count=0;
  qs.forEach(function(q){var a=answers[q.id];if(a&&a.done&&a.time){total+=a.time;count++}});
  return count>0?Math.round(total/count):0;
}

// === 新增：学习统计 ===
function getStats(){
  var qs=window._qs||Q;
  var total=qs.length;var done=0;var correct=0;var wrong=0;
  qs.forEach(function(q){var a=answers[q.id];if(a&&a.done){done++;if(a.ok)correct++;else wrong++}});
  return {total:total,done:done,correct:correct,wrong:wrong,pct:done>0?Math.round(correct/done*100):0};
}
function getChapterStats(){
  var chapters={};
  Q.forEach(function(q){
    var ch=q.chapter||'综合';
    if(!chapters[ch])chapters[ch]={total:0,done:0,correct:0};
    chapters[ch].total++;
    var a=answers[q.id];
    if(a&&a.done){chapters[ch].done++;if(a.ok)chapters[ch].correct++}
  });
  return chapters;
}

// === 新增：题目搜索 ===
var searchQuery='';
function filterQuestions(query){
  if(!query)return Q;
  query=query.toLowerCase();
  return Q.filter(function(q){
    return (q.stem||q.question||'').toLowerCase().indexOf(query)>=0||
           (q.chapter||'').toLowerCase().indexOf(query)>=0||
           JSON.stringify(q.options||{}).toLowerCase().indexOf(query)>=0;
  });
}

// === 新增：错题导出 ===
function exportWrongs(){
  loadWrongs();
  if(!wrongs.length){alert('没有错题');return}
  var text='马原错题本\n'+'='.repeat(40)+'\n\n';
  wrongs.forEach(function(id,i){
    var q=Q.find(function(x){return x.id===id});
    if(!q)return;
    var a=answers[id];
    text+=(i+1)+'. ['+typeLabel(q.type)+'] '+q.stem+'\n';
    var keys=Object.keys(q.options||{});
    keys.forEach(function(k){text+='   '+k+'. '+q.options[k]+'\n'});
    text+='   正确答案: '+q.answer+'\n';
    if(a)text+='   你的答案: '+a.sel.join('')+'\n';
    text+='\n';
  });
  var blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var link=document.createElement('a');
  link.href=url;link.download='马原错题本.txt';link.click();
  URL.revokeObjectURL(url);
}
